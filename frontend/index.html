<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Missing Person Drift Detection</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --card: #1a2235;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --muted: #8892a4;
      --low: #22c55e;
      --medium: #f59e0b;
      --high: #ef4444;
      --accent: #6366f1;
      --font: 'Inter', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: grid;
      grid-template-rows: 60px 1fr;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-stats {
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .header-stats span {
      color: var(--text);
      font-weight: 500;
    }

    .pulse {
      width: 8px;
      height: 8px;
      background: var(--low);
      border-radius: 50%;
      animation: pulse 2s infinite;
      display: inline-block;
      margin-right: 6px;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: .5;
        transform: scale(1.4);
      }
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr 320px;
      height: calc(100vh - 60px);
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Person Cards ── */
    .person-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
    }

    .person-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .person-card.selected {
      border-color: var(--accent);
    }

    .person-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .person-name {
      font-weight: 600;
      font-size: 14px;
    }

    .risk-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .risk-LOW {
      background: rgba(34, 197, 94, .15);
      color: var(--low);
    }

    .risk-MEDIUM {
      background: rgba(245, 158, 11, .15);
      color: var(--medium);
    }

    .risk-HIGH {
      background: rgba(239, 68, 68, .15);
      color: var(--high);
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .6;
      }
    }

    .person-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric {
      background: var(--surface);
      border-radius: 8px;
      padding: 8px 10px;
    }

    .metric-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-value {
      font-size: 16px;
      font-weight: 600;
      margin-top: 2px;
    }

    .risk-bar-bg {
      height: 4px;
      background: rgba(255, 255, 255, .1);
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }

    .risk-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* ── Map ── */
    #map {
      width: 100%;
      height: 100%;
    }

    /* ── Right Panel ── */
    .right-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Alert Feed ── */
    .alert-item {
      background: var(--card);
      border-left: 3px solid var(--border);
      border-radius: 0 8px 8px 0;
      padding: 10px 12px;
      font-size: 12px;
    }

    .alert-item.HIGH {
      border-color: var(--high);
    }

    .alert-item.MEDIUM {
      border-color: var(--medium);
    }

    .alert-item.LOW {
      border-color: var(--low);
    }

    .alert-time {
      color: var(--muted);
      font-size: 11px;
      margin-top: 4px;
    }

    /* ── Score Breakdown ── */
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .score-label {
      font-size: 12px;
      color: var(--muted);
    }

    .score-bar-wrap {
      flex: 1;
      margin: 0 10px;
    }

    .score-bar-bg {
      height: 6px;
      background: rgba(255, 255, 255, .08);
      border-radius: 3px;
    }

    .score-bar {
      height: 6px;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.5s;
    }

    .score-pct {
      font-size: 12px;
      font-weight: 600;
      min-width: 36px;
      text-align: right;
    }

    /* ── Map controls ── */
    .map-controls {
      position: absolute;
      top: 80px;
      right: 340px;
      z-index: 1000;
      display: flex;
      gap: 8px;
    }

    .map-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .map-btn:hover,
    .map-btn.active {
      background: var(--card);
      border-color: var(--accent);
    }

    /* ── Evaluation Panel ── */
    .eval-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .eval-card {
      background: var(--card);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .eval-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }

    .eval-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <div class="logo-icon">📍</div>
      AI Drift Detection
    </div>
    <div class="header-stats">
      <div><span class="pulse"></span>Live Monitoring</div>
      <div>Persons tracked: <span id="person-count">–</span></div>
      <div>High risk: <span id="high-count" style="color:var(--high)">–</span></div>
      <div>Updated: <span id="last-updated">–</span></div>
    </div>
  </header>

  <div class="layout">
    <!-- Left sidebar: person cards -->
    <aside class="sidebar">
      <div class="sidebar-title">Monitored Persons</div>
      <div id="person-list"></div>
    </aside>

    <!-- Map -->
    <main style="position:relative">
      <div id="map"></div>
      <div class="map-controls">
        <button class="map-btn active" onclick="setMapMode('live')">Live</button>
        <button class="map-btn" onclick="setMapMode('heatmap')">Heatmap</button>
        <button class="map-btn" onclick="setMapMode('history')">History</button>
      </div>
    </main>

    <!-- Right panel: alerts + score breakdown -->
    <div class="right-panel">
      <div>
        <div class="sidebar-title">Risk Score Breakdown</div>
        <div id="score-breakdown">
          <div style="color:var(--muted);font-size:13px">Select a person →</div>
        </div>
      </div>

      <div>
        <div class="sidebar-title">Model Evaluation</div>
        <div class="eval-grid" id="eval-grid">
          <div class="eval-card">
            <div class="eval-value" id="ev-acc">–</div>
            <div class="eval-label">Accuracy</div>
          </div>
          <div class="eval-card">
            <div class="eval-value" id="ev-prec">–</div>
            <div class="eval-label">Precision</div>
          </div>
          <div class="eval-card">
            <div class="eval-value" id="ev-rec">–</div>
            <div class="eval-label">Recall</div>
          </div>
          <div class="eval-card">
            <div class="eval-value" id="ev-f1">–</div>
            <div class="eval-label">F1 Score</div>
          </div>
        </div>
      </div>

      <div>
        <div class="sidebar-title">Alert Feed</div>
        <div id="alert-feed">
          <div style="color:var(--muted);font-size:13px">No alerts yet</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Map init ──────────────────────────────────────────────────────────────
    const HOME = [17.4200, 78.3500];
    const map = L.map('map', { zoomControl: false }).setView(HOME, 15);
    L.control.zoom({ position: 'topleft' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '©OpenStreetMap ©CartoDB', maxZoom: 19
    }).addTo(map);

    // Safe zone circle
    const safeZone = L.circle(HOME, {
      radius: 500, color: '#22c55e', weight: 2,
      fill: true, fillColor: '#22c55e', fillOpacity: 0.08
    }).addTo(map).bindTooltip('Safe Zone (500m)');

    // Home marker
    L.marker(HOME, {
      icon: L.divIcon({
        html: '<div style="background:#22c55e;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.4)">🏠</div>',
        iconSize: [32, 32], iconAnchor: [16, 16]
      })
    }).addTo(map).bindTooltip('Home');

    // ── State ─────────────────────────────────────────────────────────────────
    let personMarkers = {};
    let personPaths = {};
    let selectedPerson = null;
    const COLORS = { LOW: '#22c55e', MEDIUM: '#f59e0b', HIGH: '#ef4444' };
    const PATH_COLORS = ['#6366f1', '#ec4899', '#f59e0b', '#22d3ee', '#84cc16'];

    // ── Synthetic demo data ──────────────────────────────────────────────────
    function generateDemoPersons() {
      const persons = [
        { id: 'P001', name: 'Ravi Kumar', risk: 'LOW', dist: 0.18, score: 0.12, lat: 17.421, lon: 78.351, speed: 2.1 },
        { id: 'P002', name: 'Anita Sharma', risk: 'HIGH', dist: 1.82, score: 0.78, lat: 17.436, lon: 78.370, speed: 4.8 },
        { id: 'P003', name: 'Mohan Rao', risk: 'MEDIUM', dist: 0.72, score: 0.51, lat: 17.4145, lon: 78.3421, speed: 3.2 },
      ];
      return persons;
    }

    function generatePath(person) {
      const pts = [];
      let lat = HOME[0], lon = HOME[1];
      const steps = 20;
      for (let i = 0; i < steps; i++) {
        lat += (person.lat - HOME[0]) / steps + (Math.random() - 0.5) * 0.0005;
        lon += (person.lon - HOME[1]) / steps + (Math.random() - 0.5) * 0.0005;
        pts.push([lat, lon]);
      }
      return pts;
    }

    // ── Render person cards ────────────────────────────────────────────────────
    function renderPersonCards(persons) {
      const container = document.getElementById('person-list');
      container.innerHTML = '';

      persons.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'person-card' + (selectedPerson === p.id ? ' selected' : '');
        card.id = `card-${p.id}`;
        const barColor = COLORS[p.risk];
        const scoreW = Math.round(p.score * 100);

        card.innerHTML = `
      <div class="person-header">
        <div class="person-name">${p.name}</div>
        <div class="risk-badge risk-${p.risk}">${p.risk}</div>
      </div>
      <div class="person-metrics">
        <div class="metric">
          <div class="metric-label">Distance</div>
          <div class="metric-value" style="color:${barColor}">${p.dist.toFixed(2)}<small style="font-size:11px;font-weight:400"> km</small></div>
        </div>
        <div class="metric">
          <div class="metric-label">Speed</div>
          <div class="metric-value">${p.speed.toFixed(1)}<small style="font-size:11px;font-weight:400"> km/h</small></div>
        </div>
      </div>
      <div class="risk-bar-bg">
        <div class="risk-bar-fill" style="width:${scoreW}%;background:${barColor}"></div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px">Risk score: ${scoreW}%</div>
    `;
        card.onclick = () => selectPerson(p, persons);
        container.appendChild(card);
      });
    }

    // ── Map markers ────────────────────────────────────────────────────────────
    function updateMapMarkers(persons) {
      persons.forEach((p, idx) => {
        // Path
        if (personPaths[p.id]) map.removeLayer(personPaths[p.id]);
        const pathPts = generatePath(p);
        personPaths[p.id] = L.polyline(pathPts, {
          color: PATH_COLORS[idx % PATH_COLORS.length],
          weight: 2.5, opacity: 0.7, dashArray: '6 4'
        }).addTo(map);

        // Current position marker
        if (personMarkers[p.id]) map.removeLayer(personMarkers[p.id]);
        const color = COLORS[p.risk];
        const pulse = p.risk === 'HIGH' ? `animation:blink 1.5s infinite` : '';
        personMarkers[p.id] = L.marker([p.lat, p.lon], {
          icon: L.divIcon({
            html: `<div style="background:${color};color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;box-shadow:0 2px 12px ${color}66;${pulse}">${p.id.slice(-3)}</div>`,
            iconSize: [36, 36], iconAnchor: [18, 18]
          })
        }).addTo(map)
          .bindPopup(`<b>${p.name}</b><br>Risk: <b style="color:${color}">${p.risk}</b><br>Dist: ${p.dist.toFixed(2)} km`, { maxWidth: 200 });
      });
    }

    // ── Select person ──────────────────────────────────────────────────────────
    function selectPerson(p, persons) {
      selectedPerson = p.id;
      renderPersonCards(persons);
      map.setView([p.lat, p.lon], 15, { animate: true });
      renderScoreBreakdown(p);
    }

    // ── Score breakdown ────────────────────────────────────────────────────────
    function renderScoreBreakdown(p) {
      const scores = {
        distance: Math.min(p.dist / 1.5, 1),
        speed: Math.min(p.speed / 16, 1),
        pattern: p.risk === 'HIGH' ? 0.7 : p.risk === 'MEDIUM' ? 0.4 : 0.1,
        time_of_day: 0.15,
      };
      const labels = {
        distance: 'Distance from home',
        speed: 'Speed anomaly',
        pattern: 'Pattern deviation',
        time_of_day: 'Time of day',
      };

      let html = '';
      for (const [key, val] of Object.entries(scores)) {
        const pct = Math.round(val * 100);
        const color = pct > 65 ? '#ef4444' : pct > 35 ? '#f59e0b' : '#22c55e';
        html += `
      <div class="score-row">
        <div class="score-label">${labels[key]}</div>
        <div class="score-bar-wrap">
          <div class="score-bar-bg">
            <div class="score-bar" style="width:${pct}%;background:${color}"></div>
          </div>
        </div>
        <div class="score-pct" style="color:${color}">${pct}%</div>
      </div>`;
      }
      document.getElementById('score-breakdown').innerHTML = html;
    }

    // ── Alert feed ─────────────────────────────────────────────────────────────
    function updateAlertFeed(persons) {
      const highRisk = persons.filter(p => p.risk === 'HIGH' || p.risk === 'MEDIUM');
      if (!highRisk.length) return;

      const feed = document.getElementById('alert-feed');
      feed.innerHTML = highRisk.map(p => {
        const time = new Date().toLocaleTimeString();
        const msg = p.risk === 'HIGH'
          ? `Person moved ${p.dist.toFixed(2)}km outside safe zone`
          : `Person at ${p.dist.toFixed(2)}km from home`;
        return `
      <div class="alert-item ${p.risk}" style="margin-bottom:8px">
        <div style="font-weight:600;font-size:12px">${p.name} – ${p.risk} RISK</div>
        <div style="margin-top:3px;color:var(--muted)">${msg}</div>
        <div class="alert-time">${time} · Alert sent to caregiver</div>
      </div>`;
      }).join('');
    }

    // ── Model evaluation ───────────────────────────────────────────────────────
    function updateEvaluation() {
      // Simulated evaluation metrics (replace with /api/evaluate call)
      const metrics = { accuracy: 0.891, precision: 0.847, recall: 0.823, f1: 0.835 };
      document.getElementById('ev-acc').textContent = (metrics.accuracy * 100).toFixed(1) + '%';
      document.getElementById('ev-prec').textContent = (metrics.precision * 100).toFixed(1) + '%';
      document.getElementById('ev-rec').textContent = (metrics.recall * 100).toFixed(1) + '%';
      document.getElementById('ev-f1').textContent = (metrics.f1 * 100).toFixed(1) + '%';
    }

    // ── Map mode ───────────────────────────────────────────────────────────────
    function setMapMode(mode) {
      document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      // In production: switch tile layers or reload iframe map
    }

    // ── Main ───────────────────────────────────────────────────────────────────
    function init() {
      const persons = generateDemoPersons();

      document.getElementById('person-count').textContent = persons.length;
      document.getElementById('high-count').textContent = persons.filter(p => p.risk === 'HIGH').length;
      document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();

      renderPersonCards(persons);
      updateMapMarkers(persons);
      updateAlertFeed(persons);
      updateEvaluation();

      // Auto-select first high risk person
      const highRisk = persons.find(p => p.risk === 'HIGH');
      if (highRisk) selectPerson(highRisk, persons);

      // Simulate live updates
      setInterval(() => {
        persons.forEach(p => {
          p.lat += (Math.random() - 0.5) * 0.0008;
          p.lon += (Math.random() - 0.5) * 0.0008;
          p.dist = Math.sqrt((p.lat - HOME[0]) ** 2 + (p.lon - HOME[1]) ** 2) * 111;
          p.speed = Math.max(0, p.speed + (Math.random() - 0.5) * 0.5);
        });
        document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
        renderPersonCards(persons);
        updateMapMarkers(persons);
        updateAlertFeed(persons);
      }, 4000);
    }

    init();
  </script>
</body>

</html>
